# Furina — ousia
$col_bg = rgb(161A1B)
$col_fg = rgb(E0E1E5)
$col_surface = rgb(22272A)
$col_on_surface = rgb(C8CBD4)
$col_surface_variant = rgb(2C3236)
$col_primary = rgb(343971)
$col_on_primary = rgb(FFFFFF)
$col_primary_container = rgb(202450)
$col_secondary = rgb(494F6F)
$col_tertiary = rgb(5C618A)
$col_outline = rgb(7F818D)
$col_outline_variant = rgb(4A5055)
$col_error = rgb(F44336)
$col_shadow = rgb(000000)
$col_border_active = rgb(343971)
$col_border_inactive = rgb(4A5055)

general {
    col.active_border = $col_border_active
    col.inactive_border = $col_border_inactive
    gaps_in = 6
    gaps_out = 12
    border_size = 2
}
decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.92
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000088)
        color_inactive = rgba(00000044)
    }
}
animations {
    enabled = true
    bezier = furinaFlow, 0.22, 0.68, 0.0, 1.0
    bezier = furinaSnap, 0.4, 0.0, 0.2, 1.0
    bezier = furinaGrace, 0.05, 0.9, 0.1, 1.0
    bezier = furinaSplash, 0.0, 0.85, 0.15, 1.0
    animation = windows, 1, 5, furinaFlow, slide
    animation = windowsIn, 1, 5, furinaGrace, popin 60%
    animation = windowsOut, 1, 4, furinaSnap, popin 80%
    animation = windowsMove, 1, 4, furinaFlow
    animation = fadeIn, 1, 4, furinaGrace
    animation = fadeOut, 1, 3, furinaSnap
    animation = fadeSwitch, 1, 4, furinaFlow
    animation = fadeShadow, 1, 5, furinaFlow
    animation = fadeDim, 1, 4, furinaFlow
    animation = border, 1, 8, furinaFlow
    animation = borderangle, 1, 30, furinaFlow, loop
    animation = workspaces, 1, 5, furinaSplash, slide
    animation = specialWorkspace, 1, 5, furinaGrace, slidevert
}
group {
    col.border_active = $col_primary
    col.border_inactive = $col_outline_variant
    groupbar {
        col.active = $col_primary_container
        col.inactive = $col_surface_variant
        font_size = 11
        text_color = $col_on_surface
    }
}
